name: collect

on:
  schedule:
    - cron: "30 22 * * *"   # 06:30 Asia/Taipei — feeds the 07:00 briefing
    - cron: "30 13 * * *"   # 21:30 Asia/Taipei — feeds the 22:00 idea-engine
  workflow_dispatch:
    inputs:
      lens:
        description: "Which lens to run"
        type: choice
        options: [both, problem, you]
        default: both

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out hq-os
        uses: actions/checkout@v4

      - name: Check out hq-data
        uses: actions/checkout@v4
        with:
          repository: lostpay/hq-data
          token: ${{ secrets.HQ_DATA_TOKEN }}
          path: hq-data

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Cache the embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2-v1

      - name: Pick the lens
        id: lens
        run: |
          if [ -n "${{ inputs.lens }}" ]; then
            echo "lens=${{ inputs.lens }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 22 * * *" ]; then
            echo "lens=you" >> "$GITHUB_OUTPUT"        # morning: briefing needs news
          else
            echo "lens=problem" >> "$GITHUB_OUTPUT"    # evening: idea-engine needs candidates
          fi

      - name: Collect
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m collect.run --lens "${{ steps.lens.outputs.lens }}" --data-dir hq-data

      - name: Commit to hq-data
        working-directory: hq-data
        run: |
          git config user.name "hq-collect"
          git config user.email "hq-collect@users.noreply.github.com"
          git add sources/
          if git diff --staged --quiet; then
            echo "::error::collect produced no files at all — the run did not work"
            exit 1
          fi
          git commit -m "chore: collect ${{ steps.lens.outputs.lens }} lens $(date -u +%F)"
          git push
